<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty-7 Command Center</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1, h2 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #38bdf8; }
        input, select, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: #fff; }
        button { background: #0284c7; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #0369a1; }
        .btn-danger { background: #e11d48; }
        .btn-danger:hover { background: #be123c; }
        .btn-success { background: #16a34a; }
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Nifty-7 Admin Command Center</h1>

        <!-- Contest Governance -->
        <div class="card">
            <h2>🏆 Contest Management</h2>
            <div class="flex-row">
                <input type="text" id="newContestName" placeholder="Contest Name (e.g. IPL Special)">
                <input type="number" id="newContestFee" placeholder="Entry Fee (₹)" style="width: 120px;">
                <button onclick="createContest()">➕ Create Contest</button>
            </div>
            <br>
            <div class="flex-row">
                <button id="lockBtn" onclick="toggleLock()" class="btn-danger">🔒 Toggle Market Lock</button>
                <button onclick="resetContest()" class="btn-danger">⚠️ Reset All Contests & Squads</button>
            </div>
        </div>

        <!-- User Wallet Management -->
        <div class="card">
            <h2>👥 Registered Users & Wallets</h2>
            <button onclick="loadUsers()">🔄 Refresh User List</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Phone Number</th>
                        <th>Referral Code</th>
                        <th>Wallet Balance (₹)</th>
                        <th>Adjust Balance</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="5">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ADMIN_SECRET = "ajeet_admin_secret_99";
        const HEADERS = {
            "Content-Type": "application/json",
            "x-admin-secret": ADMIN_SECRET
        };

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users', { headers: HEADERS });
                const data = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';

                if (data.success && data.users.length > 0) {
                    data.users.forEach(u => {
                        tbody.innerHTML += `
                            <tr>
                                <td>#${u.id}</td>
                                <td><strong>${u.phone_number}</strong></td>
                                <td>${u.referral_code}</td>
                                <td>₹${parseFloat(u.balance).toFixed(2)}</td>
                                <td class="flex-row">
                                    <input type="number" id="amt_${u.id}" placeholder="Amount" style="width: 80px;">
                                    <button class="btn-success" onclick="adjustWallet(${u.id}, 'credit')">+ Add</button>
                                    <button class="btn-danger" onclick="adjustWallet(${u.id}, 'debit')">- Deduct</button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5">No users found.</td></tr>';
                }
            } catch (err) {
                alert("Error loading users. Check if server is running.");
            }
        }

        async function adjustWallet(userId, type) {
            const amountInput = document.getElementById(`amt_${userId}`);
            const amount = parseFloat(amountInput.value);
            if (!amount || amount <= 0) return alert("Please enter a valid amount.");

            try {
                const res = await fetch('/api/admin/wallet/adjust', {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify({ userId, amount, type })
                });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                    loadUsers();
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Wallet adjustment failed.");
            }
        }

        async function createContest() {
            const name = document.getElementById('newContestName').value;
            const entryFee = document.getElementById('newContestFee').value;
            if (!name) return alert("Please enter a contest name.");

            try {
                const res = await fetch('/api/admin/contests/create', {
                    method: 'POST',
                    headers: HEADERS,
                    body: JSON.stringify({ name, entryFee })
                });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                    document.getElementById('newContestName').value = '';
                    document.getElementById('newContestFee').value = '';
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Failed to create contest.");
            }
        }

        async function toggleLock() {
            try {
                const res = await fetch('/api/admin/contests/toggle-lock', { method: 'POST', headers: HEADERS });
                const data = await res.json();
                if (data.success) {
                    alert("Contest lock status changed to: " + (data.isLocked ? "LOCKED" : "UNLOCKED"));
                }
            } catch (err) {
                alert("Failed to toggle lock.");
            }
        }

        async function resetContest() {
            if (!confirm("Are you sure you want to clear all squads and reset prize pools?")) return;
            try {
                const res = await fetch('/api/admin/contests/reset', { method: 'POST', headers: HEADERS });
                const data = await res.json();
                if (data.success) alert(data.message);
            } catch (err) {
                alert("Failed to reset contests.");
            }
        }

        // Auto-load users on page start
        loadUsers();
    </script>
</body>
</html>
